name: Docker CI Pipeline

on:
  push:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          cd 03-docker-compose
          docker build -t test-node-app .

      - name: List Docker Images
        run: docker images
